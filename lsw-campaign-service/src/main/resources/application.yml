server:
  port: 8083

spring:
  application:
    name: campaign-service
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/lsw_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

# Internal service URLs — overridden by Docker Compose env vars in production
services:
  battle-url: ${BATTLE_SERVICE_URL:http://localhost:8084}
  user-url:   ${USER_SERVICE_URL:http://localhost:8081}

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always
